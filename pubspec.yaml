name: repligo
description: PDF reader with annotation, text reflow, bookmarks and in-document search.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF rendering & text extraction
  pdfx: ^2.6.0
  syncfusion_flutter_pdf: ^25.1.41
  syncfusion_flutter_core: ^25.1.41

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # File handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^9.0.0


  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24

  # Preferences
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.1.0
  intl: ^0.19.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
